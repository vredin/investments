<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Investment Assistant{% endblock %}</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #333; }
    nav { background: #1a1a2e; padding: 0 1.5rem; display: flex; align-items: center; gap: 1rem; height: 52px; }
    nav a { color: #ccc; text-decoration: none; font-size: 0.9rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
    nav a:hover { color: #fff; background: rgba(255,255,255,0.1); }
    nav .brand { color: #fff; font-weight: 600; font-size: 1rem; margin-right: auto; }
    nav form { margin: 0; }
    nav button { background: transparent; border: 1px solid #555; color: #ccc; padding: 0.25rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    nav button:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
    .flash { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
    .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .flash.info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
{% block nav %}
<nav>
  <span class="brand">Инвестиции</span>
  <a href="/">Главная</a>
  <a href="/portfolio">Портфель</a>
  <a href="/recommend">Рекомендации</a>
  <a href="/report/{{ now_month | default('2026-05') }}">Отчёт</a>
  <a href="/settings">Настройки</a>
  <a href="/sync/freedom">Синхр. Freedom</a>
  <form method="POST" action="/sync/prices" style="margin:0;">
    <button type="submit">Синхр. цены</button>
  </form>
  <form method="POST" action="/logout">
    <button type="submit">Выход</button>
  </form>
</nav>
{% endblock %}
<div class="container">
  {% if request.session.get("flash") %}
    {% set flash = request.session.pop("flash") %}
    <div class="flash {{ flash.type }}">{{ flash.msg }}</div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
