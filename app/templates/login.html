<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Investment Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); padding: 2rem; width: 100%; max-width: 360px; }
    h1 { font-size: 1.25rem; color: #1a1a2e; margin-bottom: 1.5rem; text-align: center; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.25rem; }
    input[type="password"] { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid #ccc; border-radius: 5px; font-size: 0.95rem; margin-bottom: 1rem; }
    input[type="password"]:focus { outline: none; border-color: #4a90e2; box-shadow: 0 0 0 2px rgba(74,144,226,0.2); }
    button[type="submit"] { width: 100%; padding: 0.65rem; background: #1a1a2e; color: #fff; border: none; border-radius: 5px; font-size: 0.95rem; cursor: pointer; }
    button[type="submit"]:hover { background: #2a2a4e; }
    button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; padding: 0.6rem 0.75rem; border-radius: 5px; font-size: 0.85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Investment Assistant</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login" onsubmit="this.querySelector('button').disabled=true">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password" required>
      <button type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
