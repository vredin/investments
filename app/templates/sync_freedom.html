{% extends "base.html" %}
{% block title %}Sync Freedom Finance{% endblock %}
{% block content %}
<h2 style="margin-bottom:1.5rem">Freedom Finance — Import from Excel</h2>

<div style="display:grid; gap:1.5rem; max-width:600px">

  <div style="background:#fff; border-radius:8px; padding:1.5rem; border:1px solid #ddd">
    <h3 style="margin-bottom:0.75rem">📊 Відкриті позиції (Portfolio)</h3>
    <p style="color:#666; font-size:0.9rem; margin-bottom:1rem">
      Freedom24 → Профіль → Портфель → <strong>Експорт в Excel</strong>
    </p>
    <form method="POST" action="/sync/freedom/portfolio" enctype="multipart/form-data">
      <div style="display:flex; gap:0.75rem; align-items:center">
        <input type="file" name="file" accept=".xlsx" required
               style="flex:1; padding:0.4rem; border:1px solid #ccc; border-radius:4px; font-size:0.9rem">
        <button type="submit"
                style="background:#1a7f5a; color:#fff; border:none; padding:0.5rem 1.25rem;
                       border-radius:4px; cursor:pointer; font-size:0.9rem; white-space:nowrap">
          Import Positions
        </button>
      </div>
    </form>
  </div>

  <div style="background:#fff; border-radius:8px; padding:1.5rem; border:1px solid #ddd">
    <h3 style="margin-bottom:0.75rem">📋 Угоди (Trades)</h3>
    <p style="color:#666; font-size:0.9rem; margin-bottom:1rem">
      Freedom24 → Профіль → Угоди → <strong>Експорт в Excel</strong>
    </p>
    <form method="POST" action="/sync/freedom/trades" enctype="multipart/form-data">
      <div style="display:flex; gap:0.75rem; align-items:center">
        <input type="file" name="file" accept=".xlsx" required
               style="flex:1; padding:0.4rem; border:1px solid #ccc; border-radius:4px; font-size:0.9rem">
        <button type="submit"
                style="background:#1a7f5a; color:#fff; border:none; padding:0.5rem 1.25rem;
                       border-radius:4px; cursor:pointer; font-size:0.9rem; white-space:nowrap">
          Import Trades
        </button>
      </div>
    </form>
  </div>

</div>
{% endblock %}
